services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nepse-postgres
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend (Development)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend # Using backend Dockerfile
    container_name: nepse-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      # Live reload for development
      - ./backend:/app/backend
      - ./api:/app/api
      - ./data:/app/data
      # Mount Google Cloud credentials
      - ~/.config/gcloud:/home/nepse/.config/gcloud:ro
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 80s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Vue 3 Frontend (Development with Hot Reload)
  frontend:
    image: node:18-alpine
    container_name: nepse-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: nepse-network
