services:
  # FastAPI Backend (Development)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nepse-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FASTAPI_ENV=development
    volumes:
      # Live reload for development
      - ./backend:/app/backend
      - ./api:/app/api
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vue 3 Frontend (Development with Hot Reload)
  frontend:
    image: node:18-alpine
    container_name: nepse-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://backend:8000

networks:
  default:
    name: nepse-network
