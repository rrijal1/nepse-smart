name: Data Validation and Cleanup

on:
    schedule:
        # Run weekly on Sundays at 2 AM UTC
        - cron: "0 2 * * 0"

    workflow_dispatch:

jobs:
    validate-and-cleanup:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            actions: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r data-scraper/requirements.txt

            - name: Validate data integrity
              run: |
                  cd data-scraper
                  python -c "
                  import json
                  import pandas as pd
                  from pathlib import Path
                  from datetime import datetime, timedelta

                  print('🔍 Validating data integrity...')

                  data_dir = Path('../data')
                  daily_dir = data_dir / 'daily'
                  historical_dir = data_dir / 'historical'

                  issues = []

                  # Check if we have recent data
                  today = datetime.now()
                  for i in range(7):  # Check last 7 days
                      check_date = (today - timedelta(days=i)).strftime('%Y-%m-%d')
                      price_file = daily_dir / f'{check_date}_prices.json'
                      
                      if price_file.exists():
                          print(f'✅ Found data for {check_date}')
                          break
                  else:
                      issues.append('No recent price data found in last 7 days')

                  # Check historical data consistency
                  for data_type in ['prices', 'floorsheet', 'indices']:
                      hist_file = historical_dir / f'historical_{data_type}.json'
                      if hist_file.exists():
                          try:
                              with open(hist_file, 'r') as f:
                                  data = json.load(f)
                              print(f'✅ Historical {data_type}: {len(data)} records')
                          except Exception as e:
                              issues.append(f'Error reading historical_{data_type}.json: {e}')
                      else:
                          issues.append(f'Missing historical_{data_type}.json')

                  if issues:
                      print('⚠️ Issues found:')
                      for issue in issues:
                          print(f'  - {issue}')
                  else:
                      print('✅ All data validation checks passed')
                  "

            - name: Cleanup old files
              run: |
                  cd data-scraper
                  python -c "
                  from data_processor import DataProcessor

                  processor = DataProcessor()
                  processor.cleanup_old_files(days_to_keep=30)
                  print(f'📊 Statistics saved to {stats_file}')
                  "

            - name: Configure Git
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action - Data Validation"

            - name: Commit cleanup results
              run: |
                  git add data/
                  if git diff --staged --quiet; then
                    echo "No changes from cleanup"
                  else
                    git commit -m "Weekly data validation and cleanup: $(date +'%Y-%m-%d')"
                    git push
                  fi
