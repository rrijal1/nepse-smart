name: NEPSE Data Collection

on:
    schedule:
        # Run daily at 6 AM Nepal time (12:30 AM UTC)
        - cron: "30 0 * * *"
    workflow_dispatch:
        inputs:
            scraper:
                description: "Scraper to run"
                required: false
                default: "all"
                type: choice
                options:
                    - all
                    - historical_prices
                    - macro
                    - prices
                    - official_api

jobs:
    collect-data:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  cd data-scraper
                  pip install -r requirements.txt

            - name: Run data collection
              run: |
                  cd data-scraper
                  if [ "${{ github.event.inputs.scraper }}" == "" ]; then
                    python production_main.py --scraper all
                  else
                    python production_main.py --scraper ${{ github.event.inputs.scraper }}
                  fi

            - name: Commit and push data changes
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add data/
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "Update NEPSE data - $(date +'%Y-%m-%d')" || true
                    git push
                  fi
