name: Daily NEPSE Data Collection

on:
    schedule:
        # Run every day at 3:00 AM NPT (9:15 PM UTC)
        - cron: "15 21 * * *"

    # Allow manual triggering
    workflow_dispatch:
        inputs:
            pages:
                description: "Number of floorsheet pages to scrape (0 = all pages)"
                required: false
                default: "0"
                type: string

env:
    FLOORSHEET_PAGES: ${{ github.event.inputs.pages || '0' }}

jobs:
    scrape-data:
        runs-on: ubuntu-latest
        timeout-minutes: 45 # Increased to handle full floorsheet collection

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache Python dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-scraper-

            - name: Create logs directory
              run: |
                  mkdir -p data-scraper/logs

            - name: Install minimal dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r data-scraper/requirements.txt

            - name: Run production scraper
              id: scrape
              run: |
                  cd data-scraper
                  python production_scraper.py
              continue-on-error: true

            - name: Check scraping results
              run: |
                  if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
                    echo "⚠️ Scraping failed, but continuing with available data"
                    # Check if any data was collected
                    if ls data/daily/*$(date +%Y-%m-%d)*.json 1> /dev/null 2>&1; then
                      echo "✅ Some data files found, proceeding with commit"
                    else
                      echo "❌ No data files found, stopping workflow"
                      exit 1
                    fi
                  else
                    echo "✅ Scraping completed successfully"
                  fi

            - name: Configure Git
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"

            - name: Commit and push data
              run: |
                  git add data/
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "Daily data scraping: $(date +'%Y-%m-%d')"
                    git push
                  fi

            - name: Generate collection summary
              run: |
                  python -c "
                  import json
                  import os
                  from datetime import datetime
                  from pathlib import Path

                  # Generate comprehensive summary
                  data_dir = Path('data/daily')
                  today = datetime.now().strftime('%Y-%m-%d')

                  summary = {
                      'collection_date': today,
                      'generated_at': datetime.now().isoformat(),
                      'files': {},
                      'totals': {
                          'prices': 0,
                          'floorsheet': 0,
                          'indices': 0,
                          'total_records': 0
                      },
                      'success': True
                  }

                  # Check each data type
                  data_types = ['prices', 'floorsheet', 'indices']

                  for data_type in data_types:
                      file_path = data_dir / f'{today}_{data_type}.json'
                      if file_path.exists():
                          try:
                              with open(file_path, 'r') as f:
                                  data = json.load(f)
                                  if data_type == 'indices':
                                      # Indices is wrapped in list
                                      record_count = len(data[0]['indices']) if data and data[0].get('indices') else 0
                                  else:
                                      record_count = len(data) if isinstance(data, list) else 1
                                  
                                  summary['files'][data_type] = {
                                      'filename': file_path.name,
                                      'records': record_count,
                                      'size_mb': round(file_path.stat().st_size / (1024*1024), 2)
                                  }
                                  summary['totals'][data_type] = record_count
                                  summary['totals']['total_records'] += record_count
                          except Exception as e:
                              print(f'⚠️ Error reading {file_path}: {e}')
                              summary['files'][data_type] = {'error': str(e)}
                      else:
                          print(f'⚠️ Missing {data_type} file: {file_path}')
                          summary['files'][data_type] = {'status': 'missing'}

                  # Check if collection was successful (at least prices and floorsheet)
                  success_count = sum(1 for dt in ['prices', 'floorsheet'] if summary['totals'][dt] > 0)
                  summary['success'] = success_count >= 2

                  # Save summary
                  with open('data/daily/collection_summary.json', 'w') as f:
                      json.dump(summary, f, indent=2)

                  # Print results
                  print('📊 NEPSE Data Collection Summary')
                  print('=' * 40)
                  for data_type, info in summary['files'].items():
                      if 'records' in info:
                          print(f'✅ {data_type.title()}: {info[\"records\"]} records ({info[\"size_mb\"]}MB)')
                      elif 'error' in info:
                          print(f'❌ {data_type.title()}: Error - {info[\"error\"]}')
                      else:
                          print(f'⚠️ {data_type.title()}: Missing')

                  print(f'📈 Total Records: {summary[\"totals\"][\"total_records\"]}')
                  print(f'🎯 Collection Success: {\"✅ YES\" if summary[\"success\"] else \"❌ NO\"}')

                  # Exit with error if critical failure
                  if not summary['success']:
                      print('❌ Critical failure: Missing essential data')
                      exit(1)
                  "
