name: NEPSE Data Collection

on:
  schedule:
    # Run daily at 4:30 AM Nepal time (10:45 PM UTC previous day)
    - cron: "45 22 * * *"

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      scraper_type:
        description: "Scraper to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - official_api
          - macro

jobs:
  # Job 1: Official NEPSE API (security list, floorsheet, market status, indices, price/volume data)
  scrape-official-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'official_api' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape official NEPSE API
        id: scrape-official
        run: |
          cd data-scraper
          python production_main.py --scraper official_api
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Official API Scraper"
      - name: Commit official API data
        if: always()
        run: |
          git pull --rebase origin main
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No official API data to commit"
          else
            git commit -m "Update official API data - $(date +'%Y-%m-%d')" || true
            git push || true
          fi

  # Job 2: NRB Banking Data (macroeconomic indicators)
  scrape-macro:
    uses: rrijal1/nepse-smart/.github/workflows/reusable-scraper.yml@main
    with:
      scraper_name: macro
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'macro' }}
