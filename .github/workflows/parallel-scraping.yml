name: NEPSE Data Collection

on:
  schedule:
    # Run all data collection at 9:00 PM Nepal time (3:15 PM UTC)
    - cron: "15 15 * * 0-4"

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      scraper_type:
        description: "Scraper to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - official_api
          - macro
          - floorsheet

jobs:
  # Job 1: Official NEPSE API (security list, floorsheet, market status, indices, price/volume data)
  scrape-official-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'official_api' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clean and update workspace
        run: |
          # Clean any unstaged changes and pull latest
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape official NEPSE API
        id: scrape-official
        run: |
          cd data-scraper
          python production_main.py --scraper official_api
        continue-on-error: true

      - name: Cleanup old lookup files
        run: |
          cd data-scraper
          python cleanup_old_lookup_files.py --days 7
        continue-on-error: true

      - name: Archive old data files
        run: |
          cd data-scraper
          python cleanup_and_archive_old_data.py --days 7
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Official API Scraper"
      - name: Commit official API data
        if: always()
        run: |
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No official API data to commit"
          else
            git commit -m "Update official API data - $(date +'%Y-%m-%d')" || true
            git push || true
          fi

  # Job 2: NRB Banking Data (macroeconomic indicators)
  scrape-macro:
    uses: rrijal1/nepse-smart/.github/workflows/reusable-scraper.yml@main
    with:
      scraper_name: macro
    permissions:
      contents: write
      actions: read
    needs: scrape-official-api
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'macro' }}

  # Job 3: Floorsheet Collection (runs at 9:00 PM Nepal time)
  scrape-floorsheet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    needs: scrape-macro
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'floorsheet' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clean and update workspace
        run: |
          # Clean any unstaged changes and pull latest
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape floorsheet data
        id: scrape-floorsheet
        run: |
          cd data-scraper
          echo "Starting floorsheet collection at $(date) UTC"
          echo "This corresponds to $(date -d '+5 hours 45 minutes') Nepal time"
          python -c "
          from nepse_official_data_fetcher import NEPSEOfficialDataFetcher
          fetcher = NEPSEOfficialDataFetcher()
          try:
              result = fetcher.fetch_method_data('floorsheet', fetcher.core_methods['floorsheet'])
              record_count = result.get('record_count', 0) if result else 0
              print(f'Floorsheet collection result: {record_count} records')
              if record_count > 0:
                  print('SUCCESS: Floorsheet data collected!')
              else:
                  print('INFO: No floorsheet data available (may be holiday or after midnight Nepal time)')
          finally:
              fetcher.close_session()
          "
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Floorsheet Collector"

      - name: Commit floorsheet data
        if: always()
        run: |
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No floorsheet data to commit"
          else
            git commit -m "Update floorsheet data - $(date +'%Y-%m-%d')" || true
            git push || true
          fi
