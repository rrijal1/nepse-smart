name: Parallel NEPSE Data Collection

on:
  schedule:
    - cron: "0 23 * * 0-4" # 11:00 PM NPT on all days except Saturday and Friday

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      scraper_type:
        description: "Scraper to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - official_api
          - floorsheet
          - indices
          - macro

jobs:
  # Job 1: Official NEPSE API (Company List, Floorsheet, Market Status)
  scrape-official-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape official NEPSE API
        id: scrape-official
        run: |
          cd data-scraper
          python production_main.py --scraper official_api
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Official API Scraper"

      - name: Commit official API data
        if: always()
        run: |
          git add data/daily/*_company_list.json data/daily/*_market_status.json || true
          if git diff --staged --quiet; then
            echo "No official API data to commit"
          else
            git commit -m "Official NEPSE API data (company list + market status): $(date +'%Y-%m-%d')" || true
            git push || true
          fi

