  # Job 3: Indices from NEPSE
  scrape-indices:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape indices
        id: scrape-indices
        run: |
          cd data-scraper
          python production_main.py --scraper indices
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Indices Scraper"

      - name: Commit indices data
        if: always()
        run: |
          git pull --rebase
          git add data/daily/*_indices.json data/historical/historical_indices.json || true
          if git diff --staged --quiet; then
            echo "No indices data to commit"
          else
            git commit -m "Indices data: $(date +'%Y-%m-%d')" || true
            git push || true
          fi

  # Job 4: NRB Banking Data
  scrape-macro:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape NRB data
        id: scrape-macro
        run: |
          cd data-scraper
          python production_main.py --scraper macro
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Macro Scraper"

      - name: Commit macro data
        if: always()
        run: |
          git pull --rebase
          git add data/daily/*_macro.json data/historical/historical_macro.json || true
          if git diff --staged --quiet; then
            echo "No macro data to commit"
          else
            git commit -m "Macro banking data: $(date +'%Y-%m-%d')" || true
            git push || true
          fi

  # Job 5: Generate Technical Indicators
  generate-technicals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    needs:
      [scrape-official-api, scrape-indices, scrape-macro]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Fetch latest commits (ensure daily files are present)
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Generate technical indicators
        run: |
          cd data-scraper
          python generate_technicals.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Technicals Generator"

      - name: Commit technical indicators
        run: |
          git add data/daily/*_technicals.json || true
          if git diff --staged --quiet; then
            echo "No technical indicators to commit"
          else
            git commit -m "Technical indicators: $(date +'%Y-%m-%d')" || true
            git push || true
          fi
