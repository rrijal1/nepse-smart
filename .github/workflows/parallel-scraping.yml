name: Parallel NEPSE Data Collection

on:
  schedule:
    - cron: "0 23 * * 0-4" # 11:00 PM NPT on weekdays (Sun-Thu)

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      scraper_type:
        description: "Scraper to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - official_api
          - prices
          - macro

jobs:
  # Job 1: Official NEPSE API (Company List, Floorsheet, Market Status)
  scrape-official-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'official_api' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/daily data/historical data-scraper/logs

      - name: Scrape official NEPSE API
        id: scrape-official
        run: |
          cd data-scraper
          python production_main.py --scraper official_api
        continue-on-error: true

      - name: Configure Git
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Official API Scraper"
      - name: Commit official API data
        if: always()
        run: |
          git stash || true
          git pull --rebase
          git stash pop || true
          git add data/daily/*_security_list.json data/daily/*_market_status.json data/daily/*_floorsheet.json data/daily/*_nepse_index.json data/daily/*_nepse_subindices.json data/daily/*_supply_demand.json data/lookup/*_security_id_key_map.json data/lookup/*_sector_scrips.json || true
          if git diff --staged --quiet; then
            echo "No official API data to commit"
          else
            git commit -m "Official NEPSE API data (security list + market status + floorsheet + indices + supply/demand + lookup + sectors): $(date +'%Y-%m-%d')" || true
            git push || true
          fi

  # Job 2: NRB Banking Data
  scrape-macro:
    uses: ./.github/workflows/reusable-scraper.yml
    with:
      scraper_name: macro
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'macro' }}

  # Job 3: ShareSansar Stock Prices
  scrape-prices:
    uses: ./.github/workflows/reusable-scraper.yml
    with:
      scraper_name: prices
    permissions:
      contents: write
      actions: read
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scraper_type == 'all' || inputs.scraper_type == 'prices' }}

  # Job 4: Generate Technical Indicators
  generate-technicals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    needs: [scrape-official-api, scrape-macro, scrape-prices]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Fetch latest commits (ensure daily files are present)
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scraper-${{ hashFiles('data-scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-scraper-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-scraper/requirements.txt

      - name: Generate technical indicators
        run: |
          cd data-scraper
          python generate_technicals.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Technicals Generator"

      - name: Commit technical indicators
        if: always()
        run: |
          git add data/daily/*_technicals.json || true
          if git diff --staged --quiet; then
            echo "No technical indicators to commit"
          else
            git commit -m "Technical indicators: $(date +'%Y-%m-%d')" || true
            git push || true
          fi
